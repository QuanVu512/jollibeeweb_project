<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --success: #28a745;
            --warning: #f39c12;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #2d3436;
            --border: #e9ecef;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1320px;
            margin: auto;
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border-bottom: 2px solid #ffe082;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        h2 {
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            font-size: 24px;
        }
        .badge {
            background: #fff3e0;
            color: var(--warning);
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #fff5f5, #fff);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }
        .stat-card strong { display: block; font-size: 20px; color: var(--primary); }
        .form-add {
            background: #fff5f5;
            padding: 18px;
            border: 1px dashed var(--primary);
            border-radius: 12px;
            margin-bottom: 22px;
        }
        .form-add form { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .form-add input, .form-add select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 120px;
        }
        .btn-add, .btn-save {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: white;
        }
        .btn-add { background: var(--primary); }
        .btn-add:hover { background: var(--primary-dark); }
        .btn-save { background: var(--success); }
        .btn-save:hover { background: #218838; }
        .btn-delete { color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { border-bottom: 1px solid var(--border); padding: 10px; vertical-align: middle; }
        tr:hover { background-color: #fff9f9; }
        .inline-input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 6px 0; }
        .alert { padding: 12px 14px; margin-bottom: 16px; border-radius: 8px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .low-stock { color: red; font-weight: 700; }
        @media (max-width: 900px) {
            .stats { grid-template-columns: 1fr; }
            .form-add form { flex-direction: column; align-items: stretch; }
            .form-add input, .form-add select { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h2>Quản lý khu vực bếp</h2>
        <div class="badge">Jollibee Kitchen Dashboard</div>
    </div>

    {{MESSAGE}}
    {{STATS}}

    <div class="form-add">
        <strong style="color: var(--primary);">+ Thêm món mới</strong><br><br>
        <form method="POST">
            <input type="text" name="ten_mon" placeholder="Tên món" required>
            <input type="number" name="gia" placeholder="Giá" required>
            <input type="number" name="so_luong" placeholder="SL kho" required>
            <input type="text" name="hinh_anh" placeholder="Link ảnh (ga.png)">
            <select name="ma_loai" required>
                <option value="">-- Chọn loại món --</option>
                {{CATEGORY_OPTIONS}}
            </select>
            <button type="submit" name="btn_add" class="btn-add">Xác nhận thêm</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Mã</th>
                <th>Tên món</th>
                <th>Phân loại</th>
                <th>Giá bán</th>
                <th>Số lượng kho</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            {{ROWS}}
        </tbody>
    </table>
</div>
<script src="bep.js"></script>
</body>
</html>
