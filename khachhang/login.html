<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Jollibee</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-container img { width: 100px; margin-bottom: 20px; }
        .auth-container h2 { color: #e21b22; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: #e21b22; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        .btn-submit:hover { background: #b9151c; }
        .link-text { margin-top: 15px; font-size: 14px; }
        .link-text a { color: #e21b22; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="homepage.html">
            <img src="https://jollibee.com.vn/static/version1772723312/frontend/Jollibee/default/vi_VN/images/logo.png" alt="Logo">
        </a>
        <h2>Đăng Nhập</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="log-username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="log-password" required>
            </div>
            <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
        </form>
        
        <p class="link-text">Chưa có tài khoản? <a href="register.html">Tạo tài khoản mới</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('log-username').value;
            const password = document.getElementById('log-password').value;

            try {
                const response = await fetch('http://localhost:3000/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    if(result.token) {
                        localStorage.setItem('accessToken', result.token);
                    }
                    alert("Đăng nhập thành công!");
                    window.location.href = "homepage.html"; 
                } else {
                    alert("Lỗi: Sai tài khoản hoặc mật khẩu!");
                }
            } catch (error) {
                console.error(error);
                alert("Không thể kết nối tới Server!");
            }
        });
    </script>
</body>
</html>
