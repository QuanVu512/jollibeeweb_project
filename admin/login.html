<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập hệ thống - Jollibee</title>
  <link rel="icon" href="/assets/logo.png">
  <link rel="stylesheet" href="/admin/assets/css/admin.css">
  <script src="/admin/assets/js/api.js" defer></script>
  <script src="/admin/assets/js/login.js" defer></script>
</head>
<body>
  <main class="login-page">
    <section class="login-card" aria-labelledby="login-title">
      <img class="login-logo" src="/assets/logo.png" alt="Jollibee">
      <h1 id="login-title">Jollibee</h1>
      <p>Đăng nhập để tiếp tục với vai trò của bạn</p>

      <div id="login-error" class="login-error" role="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button id="login-button" class="btn btn-primary btn-block" type="submit">Đăng nhập</button>
      </form>
    </section>
  </main>
</body>
</html>
