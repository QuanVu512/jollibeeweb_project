<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/logo.png">
    <style>
        * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
        body { 
            background-color: #fdf5e6; 
            background-image: url('data:image/svg+xml;utf8,<svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><text x="20" y="30" font-size="20" opacity="0.04">👤</text><text x="80" y="80" font-size="20" opacity="0.04">📋</text></svg>');
            margin: 0; padding: 0; 
        }
        header { background-color: #fff; padding: 15px; text-align: center; border-bottom: 4px solid #d8262f; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
        header img { height: 75px; }
        .user-menu { position: absolute; right: 30px; display: inline-block; }
        .avatar-btn { background: #fff; border: 2px solid #d8262f; border-radius: 50px; padding: 5px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700; color: #d8262f; }
        .avatar-btn img { width: 35px; height: 35px; border-radius: 50%; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; border: 1px solid #eee; z-index: 100; }
        .dropdown-content a { color: #2b2b2b; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; text-align: left; border-bottom: 1px solid #eee; }
        .dropdown-content a:hover { background-color: #fdf5e6; color: #d8262f; }
        .user-menu:hover .dropdown-content { display: block; }
        
        .nav-menu { background-color: #2b2b2b; padding: 12px; text-align: center; }
        .nav-menu a { color: white; text-decoration: none; margin: 0 20px; font-weight: 700; text-transform: uppercase; }
        .nav-menu a.active { color: #f3a22f; }
        
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; position: relative; z-index: 10; }
        .form-card { background: #fff; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 6px solid #d8262f; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #2b2b2b; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #d8262f; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        .btn-red { background: #d8262f; color: white; box-shadow: 0 4px 0 #a81c23; }
        .btn-red:hover { background-color: #b51c22; }
        .btn-red:disabled { background-color: #6c757d; box-shadow: 0 4px 0 #495057; cursor: not-allowed; }
    </style>
    <script src="/assets/js/role-guard.js" defer></script>
    <script src="/banhang/banhang-api.js" defer></script>
    <script src="/banhang/ho_so.js" defer></script>
</head>
<body data-required-role="cashier, kitchen, admin">
<header>
    <img src="https://jollibee.com.vn/static/version1775488343/frontend/Jollibee/default/vi_VN/images/logo.png" alt="Jollibee Logo">
    <div class="user-menu">
        <div class="avatar-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
            <span id="staff-name">Nhân viên</span>
        </div>
        <div class="dropdown-content">
            <a href="ho_so.html">👤 Sửa hồ sơ bản thân</a>
            <a href="doi_mat_khau.html">🔑 Đổi mật khẩu</a>
            <a href="#" id="btn-logout" style="color: #d8262f; border-bottom: none;">🚪 Đăng xuất</a>
        </div>
    </div>
</header>
<div class="nav-menu">
    <a href="tao_don_hang.html" id="nav-cashier-only-1">Tạo đơn tại quầy</a>
    <a href="quan_ly_don_hang.html" id="nav-cashier-only-2">Xác nhận đơn hàng</a>
    <a href="bep_che_bien.html" id="nav-kitchen-only">Bếp chế biến</a>
</div>
<div class="container">
    <div class="form-card">
        <h2 style="text-align: center; color: #d8262f; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; margin-top: 0;">Thông tin cá nhân</h2>
        
        <form id="profile-form">
            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Họ và tên">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" name="phone" placeholder="Số điện thoại">
            </div>

            <div class="form-group">
                <label for="hometown">Quê quán / Địa chỉ</label>
                <input type="text" id="hometown" name="hometown" placeholder="Địa chỉ">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email">
            </div>

            <div class="form-group">
                <label for="birthDate">Ngày sinh</label>
                <input type="date" id="birthDate" name="birthDate">
            </div>

            <div class="form-group">
                <label for="gender">Giới tính</label>
                <select id="gender" name="gender">
                    <option value="">Chưa chọn</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>

            <button type="submit" id="btn-save" class="btn btn-red">Lưu thay đổi</button>
        </form>
    </div>
</div>
</body>
</html>
