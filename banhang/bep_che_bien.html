<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khu vực bếp Jollibee</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/logo.png">
    <style>
        * { font-family: 'Nunito', 'Segoe UI', -apple-system, sans-serif; box-sizing: border-box; }
        input, select, textarea, button { font-family: 'Nunito', 'Segoe UI', -apple-system, sans-serif; }
        .emoji { font-family: "Segoe UI Emoji", "Segoe UI Symbol", "Apple Color Emoji", "Noto Color Emoji", sans-serif; margin-right: 4px; }
        body { 
            background-color: #fff9e6; 
            background-image: url('data:image/svg+xml;utf8,<svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><text x="10" y="40" font-size="20" opacity="0.04">🍗</text><text x="70" y="80" font-size="20" opacity="0.04">🌶️</text></svg>');
            margin: 0; padding: 0; 
        }
        header { background-color: #fff; padding: 15px; text-align: center; border-bottom: 4px solid #d8262f; display: flex; justify-content: center; align-items: center; position: relative; }
        header img { height: 75px; }
        .user-menu { position: absolute; right: 30px; display: inline-block; }
        .avatar-btn { background: #fff; border: 2px solid #d8262f; border-radius: 50px; padding: 5px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 700; color: #d8262f; }
        .avatar-btn img { width: 35px; height: 35px; border-radius: 50%; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 200px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; border: 1px solid #eee; z-index: 100; }
        .dropdown-content a { color: #2b2b2b; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; text-align: left; border-bottom: 1px solid #eee; }
        .dropdown-content a:hover { background-color: #fdf5e6; color: #d8262f; }
        .user-menu:hover .dropdown-content { display: block; }
        
        .nav-menu { background-color: #2b2b2b; padding: 12px; text-align: center; }
        .nav-menu a { color: white; text-decoration: none; margin: 0 20px; font-weight: 700; text-transform: uppercase; }
        .nav-menu a.active { color: #f3a22f; }
        
        .kitchen-container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        .column { flex: 1; background: rgba(255,255,255,0.7); border-radius: 15px; padding: 15px; border: 2px dashed #f3a22f; min-width: 320px; }
        .column-title { text-align: center; color: #d8262f; text-transform: uppercase; font-weight: 900; font-size: 24px; margin-bottom: 20px; margin-top: 10px; }
        
        .ticket { background: #fff; border-top: 8px solid #f3a22f; border-radius: 12px; padding: 20px; box-shadow: 6px 6px 0px rgba(0,0,0,0.15); margin-bottom: 20px; }
        .qty { background: #d8262f; color: white; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: 10px; font-weight: 900; }
        .btn-action { color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 900; margin-top: 15px; text-transform: uppercase; transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; }
    </style>
    <script src="/assets/js/role-guard.js" defer></script>
    <script src="/banhang/banhang-api.js" defer></script>
    <script src="/banhang/bep_che_bien.js" defer></script>
</head>
<body data-required-role="kitchen, cashier, admin">
<header>
    <img src="https://jollibee.com.vn/static/version1775488343/frontend/Jollibee/default/vi_VN/images/logo.png" alt="Jollibee Logo">
    <div class="user-menu">
        <div class="avatar-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
            <span id="staff-name">Nhân viên bếp</span>
        </div>
        <div class="dropdown-content">
            <a href="#" id="btn-logout" style="color: #d8262f; border-bottom: none;"><span class="emoji">🚪</span> Đăng xuất</a>
        </div>
    </div>
</header>
<div class="nav-menu">
    <a href="tao_don_hang.html" id="nav-cashier-only-1">Tạo đơn tại quầy</a>
    <a href="quan_ly_don_hang.html" id="nav-cashier-only-2">Xác nhận đơn hàng</a>
    <a href="bep_che_bien.html" class="active">Bếp chế biến</a>
</div>

<div class="kitchen-container">
    <div class="column">
        <h2 class="column-title"><span class="emoji">🍽️</span> Ăn tại chỗ</h2>
        <div id="dine-in-tickets">
            <p style="text-align: center; color: #888;">Đang tải danh sách món ăn...</p>
        </div>
    </div>

    <div class="column">
        <h2 class="column-title"><span class="emoji">🛵</span> Giao hàng / Ship</h2>
        <div id="delivery-tickets">
            <p style="text-align: center; color: #888;">Đang tải danh sách món ăn...</p>
        </div>
    </div>
</div>
</body>
</html>
